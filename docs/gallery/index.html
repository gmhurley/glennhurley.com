<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Artist A &mdash; Gallery</title>

  <!-- SEO -->
  <meta
    name="description"
    content="Original works by Artist A."
  />
  <link rel="canonical" href="https://glennhurley.com/gallery/" />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Artist A — Gallery" />
  <meta property="og:description" content="Original works by Artist A." />
  <meta property="og:url" content="https://glennhurley.com/gallery/" />

  <!-- Styles -->
  <link rel="stylesheet" href="/css/gallery.css" />
</head>
<body>
  <main class="gallery-container">

    <header class="gallery-header">
      <div class="back-link"><a href="/">&larr; glennhurley.com</a></div>
      <h1>Artist A</h1>
      <p class="gallery-tagline">Original works on paper &amp; canvas.</p>
    </header>

    <!-- TEMPLATE
    <figure class="artwork">
      <div class="artwork-frame">
        <img src="img/filename.jpg" alt="Brief description of the piece" loading="lazy" />
      </div>
      <figcaption>
        <span class="artwork-title">Title</span>
        <span class="artwork-date">2026</span>
      </figcaption>
    </figure>
    -->

    <div class="gallery-grid">

      <figure class="artwork">
        <div class="artwork-frame">
          <img src="img/the-perfect-circle.jpg" alt="The Perfect Circle" loading="lazy" />
        </div>
        <figcaption>
          <span class="artwork-title">The Perfect Circle</span>
          <span class="artwork-date">2026</span>
        </figcaption>
      </figure>

      <figure class="artwork">
        <div class="artwork-frame">
          <img src="img/IMG_5250.jpg" alt="The Masterpiece" loading="lazy" />
        </div>
        <figcaption>
          <span class="artwork-title">The Masterpiece</span>
          <span class="artwork-date">2026</span>
        </figcaption>
      </figure>

      <!-- Add new pieces above this line, newest first -->

    </div>

    <footer class="gallery-footer">
      All works &copy; Artist A. Proud dad &mdash; <a href="/">Glenn Hurley</a>.
    </footer>

  </main>

  <script data-goatcounter="https://shroomslice.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

</html>
