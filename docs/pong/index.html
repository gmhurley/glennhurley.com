<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pong &mdash; Glenn Hurley</title>
  <meta name="description" content="A quick game of Pong. 3 minutes. Score as many as you can." />
  <link rel="canonical" href="https://glennhurley.com/pong/" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .pong-wrap {
      margin-top: 2.5rem;
    }

    .game-aspect {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      border: 1px solid #e1e8ed;
      border-radius: 8px;
      overflow: hidden;
      background: #111;
    }

    .game-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      border: none;
    }

    .game-note {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="intro">
      <div class="back-link"><a href="/">&larr; glennhurley.com</a></div>
      <h1>Pong</h1>
      <p class="tagline">60 seconds. Score as many as you can.</p>
    </div>

    <div class="pong-wrap">
      <div class="game-aspect">
        <iframe
          src="/pong/game.html"
          class="game-frame"
          title="Pong game"
          scrolling="no"
        ></iframe>
      </div>
      <p class="game-note">Desktop: W / S or arrow keys &nbsp;&middot;&nbsp; Mobile: touch to control</p>
    </div>

    <footer>
      &copy; <span id="year"></span> Glenn Hurley
    </footer>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
  <script data-goatcounter="https://shroomslice.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
