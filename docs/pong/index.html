<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Pong &mdash; Glenn Hurley</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      background: #111;
    }

    /* ── Site header ── */
    .site-header {
      flex: 0 0 auto;
      background: #f8f9fb;
      border-bottom: 1px solid #e1e8ed;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      gap: 1rem;
    }

    .site-header a {
      text-decoration: none;
      color: #1da1f2;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .site-header a:hover { text-decoration: underline; }

    .header-title {
      font-size: 1rem;
      font-weight: 700;
      color: #222;
      letter-spacing: -0.01em;
    }

    .header-hint {
      font-size: 0.72rem;
      color: #aaa;
      text-align: right;
      white-space: nowrap;
    }

    /* ── Game area ── */
    #game-area {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
    }

    canvas {
      display: block;
      position: absolute;
      inset: 0;
      touch-action: none;
    }

    /* ── Overlay screens ── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: rgba(17, 17, 17, 0.96);
      color: #fff;
    }
    .screen.hidden { display: none; }

    .screen h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.2rem;
    }
    .screen h2 {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.2rem;
    }
    .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      margin-bottom: 1.5rem;
    }

    /* Leaderboard */
    .leaderboard {
      width: 100%;
      max-width: 400px;
      margin-bottom: 1.5rem;
    }
    .lb-header {
      display: grid;
      grid-template-columns: 2rem 1fr auto auto;
      gap: 0.5rem;
      padding: 0.35rem 0.75rem;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .lb-row {
      display: grid;
      grid-template-columns: 2rem 1fr auto auto;
      gap: 0.5rem;
      padding: 0.45rem 0.75rem;
      font-size: clamp(0.75rem, 2vw, 0.85rem);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      align-items: center;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank  { color: rgba(255,255,255,0.3); font-size: 0.8em; }
    .lb-name  { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { font-weight: 700; color: #1da1f2; text-align: right; }
    .lb-date  { color: rgba(255,255,255,0.3); font-size: 0.75em; text-align: right; white-space: nowrap; }
    .lb-empty, .lb-loading {
      text-align: center;
      padding: 1.25rem;
      color: rgba(255,255,255,0.3);
      font-size: 0.85rem;
    }

    .prompt {
      font-size: clamp(0.75rem, 2vw, 0.85rem);
      color: rgba(255,255,255,0.35);
    }

    /* Game over */
    .final-score {
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 700;
      color: #1da1f2;
      line-height: 1;
      margin-bottom: 0.2rem;
    }
    .final-label {
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    /* Name form */
    .name-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
      width: 100%;
      max-width: 280px;
      margin-bottom: 1rem;
    }
    .name-form input {
      width: 100%;
      padding: 0.6rem 1rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      text-align: center;
      outline: none;
    }
    .name-form input:focus { border-color: #1da1f2; }
    .name-form input::placeholder { color: rgba(255,255,255,0.25); }

    .btn {
      width: 100%;
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #1da1f2; color: #fff; }
    .btn-ghost {
      background: transparent;
      color: rgba(255,255,255,0.35);
      font-size: 0.82rem;
      font-weight: 400;
    }

    /* HUD (timer + score while playing) */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      padding: 0.6rem 1rem;
      pointer-events: none;
    }
    #hud.hidden { display: none; }

    #hud-score {
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      font-variant-numeric: tabular-nums;
    }
    #hud-timer {
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      font-variant-numeric: tabular-nums;
    }
    #hud-timer.urgent { color: #e05; }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="/">&larr; glennhurley.com</a>
    <span class="header-title">Pong</span>
    <span class="header-hint">W / S or arrows<br>Touch to control</span>
  </header>

  <div id="game-area">

    <canvas id="pong"></canvas>

    <!-- HUD: shown while playing -->
    <div id="hud" class="hidden">
      <span id="hud-score">0</span>
      <span id="hud-timer">1:00</span>
    </div>

    <!-- Start screen -->
    <div id="screen-start" class="screen">
      <h1>Pong</h1>
      <p class="subtitle">60 seconds &mdash; score as many as you can.</p>
      <div class="leaderboard">
        <div class="lb-header">
          <span></span><span>Name</span><span>Score</span><span>Date</span>
        </div>
        <div id="lb-body">
          <div class="lb-loading">Loading leaderboard&hellip;</div>
        </div>
      </div>
      <p class="prompt">Press any key or tap to start</p>
    </div>

    <!-- Game over screen -->
    <div id="screen-gameover" class="screen hidden">
      <h2>Time&rsquo;s up!</h2>
      <div class="final-score" id="final-score">0</div>
      <p class="final-label">points scored</p>
      <form class="name-form" id="name-form">
        <input
          type="text"
          id="name-input"
          placeholder="Enter your name"
          maxlength="20"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button type="submit" class="btn btn-primary" id="submit-btn">Add to leaderboard</button>
      </form>
      <button class="btn btn-ghost" id="skip-btn">Skip &rarr; play again</button>
    </div>

  </div><!-- /game-area -->

  <script>
    // ── Dreamlo ───────────────────────────────────────────────────
    const PRIVATE_CODE = 'Bks8DhRiZk6Ad0btWv8OeQJ6JmvCSPvEKmMWet2sPQVQ';
    const PUBLIC_CODE  = '69dae9088f40bc2f6048b924';

    async function fetchScores() {
      try {
        const res  = await fetch(`https://dreamlo.com/lb/${PUBLIC_CODE}/json/10`);
        const data = await res.json();
        let entries = data?.dreamlo?.leaderboard?.entry ?? [];
        if (!Array.isArray(entries)) entries = [entries];
        return entries;
      } catch { return null; }
    }

    async function postScore(name, score) {
      const safe = encodeURIComponent(name.trim() || 'Anonymous');
      await fetch(`https://dreamlo.com/lb/${PRIVATE_CODE}/add/${safe}/${score}`);
    }

    function formatDate(str) {
      if (!str) return '';
      const d = new Date(str.replace(' ', 'T') + 'Z');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderLeaderboard(entries) {
      const body = document.getElementById('lb-body');
      if (!entries || entries.length === 0) {
        body.innerHTML = '<div class="lb-empty">No scores yet &mdash; be the first!</div>';
        return;
      }
      body.innerHTML = entries.map((e, i) => `
        <div class="lb-row">
          <span class="lb-rank">${i + 1}</span>
          <span class="lb-name">${escHtml(e.name)}</span>
          <span class="lb-score">${e.score}</span>
          <span class="lb-date">${formatDate(e.date)}</span>
        </div>`).join('');
    }

    // ── Game ──────────────────────────────────────────────────────
    const gameArea = document.getElementById('game-area');
    const canvas   = document.getElementById('pong');
    const ctx      = canvas.getContext('2d');

    const GAME_DURATION = 60;

    let W, H, PW, PH, BR, PSPEED, MARGIN;
    let playerY, aiY, ballX, ballY, ballVX, ballVY, aiTargetY;
    let playerScore = 0;
    let timeLeft    = GAME_DURATION;
    let lastTick    = null;
    let state       = 'start';
    let keys        = {};
    let pointerY    = null;
    let activePointer = false;

    const screenStart    = document.getElementById('screen-start');
    const screenGameover = document.getElementById('screen-gameover');
    const hud            = document.getElementById('hud');
    const hudTimer       = document.getElementById('hud-timer');
    const hudScore       = document.getElementById('hud-score');
    const finalScoreEl   = document.getElementById('final-score');
    const nameForm       = document.getElementById('name-form');
    const nameInput      = document.getElementById('name-input');
    const submitBtn      = document.getElementById('submit-btn');
    const skipBtn        = document.getElementById('skip-btn');

    function showScreen(name) {
      screenStart.classList.toggle('hidden',    name !== 'start');
      screenGameover.classList.toggle('hidden', name !== 'gameover');
      hud.classList.toggle('hidden',            name !== 'playing');
    }

    function resize() {
      W = canvas.width  = gameArea.clientWidth;
      H = canvas.height = gameArea.clientHeight;
      PW     = Math.max(8,  W * 0.018);
      PH     = Math.max(50, H * 0.18);
      BR     = Math.max(5,  W * 0.011);
      PSPEED = H * 0.011;
      MARGIN = PW * 2.5;
    }

    function resetBall(dir) {
      ballX = W / 2;
      ballY = H / 2;
      const angle = Math.random() * 0.5 - 0.25;
      const d     = dir ?? (Math.random() < 0.5 ? 1 : -1);
      const spd   = W * 0.01;
      ballVX = Math.cos(angle) * spd * d;
      ballVY = Math.sin(angle) * spd;
      aiTargetY = H / 2;
    }

    function startGame() {
      playerScore = 0;
      timeLeft    = GAME_DURATION;
      lastTick    = null;
      playerY = H / 2 - PH / 2;
      aiY     = H / 2 - PH / 2;
      resetBall();
      state = 'playing';
      showScreen('playing');
      updateHud();
    }

    function endGame() {
      state = 'gameover';
      showScreen('gameover');
      finalScoreEl.textContent = playerScore;
      nameInput.value = '';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Add to leaderboard';
      setTimeout(() => nameInput.focus(), 100);
    }

    function updateHud() {
      const m = Math.floor(timeLeft / 60);
      const s = Math.floor(timeLeft % 60);
      hudTimer.textContent = `${m}:${String(s).padStart(2, '0')}`;
      hudTimer.classList.toggle('urgent', timeLeft <= 15);
      hudScore.textContent = playerScore;
    }

    function clampY(y) { return Math.max(0, Math.min(H - PH, y)); }

    function update(ts) {
      if (state !== 'playing') return;

      if (lastTick !== null) {
        const dt = Math.min((ts - lastTick) / 1000, 0.1);
        timeLeft -= dt;
        if (timeLeft <= 0) { timeLeft = 0; updateHud(); endGame(); return; }
        updateHud();
      }
      lastTick = ts;

      // Player paddle
      if (pointerY !== null) {
        playerY += (pointerY - PH / 2 - playerY) * 0.25;
      } else {
        if (keys['w'] || keys['W'] || keys['ArrowUp'])   playerY -= PSPEED;
        if (keys['s'] || keys['S'] || keys['ArrowDown']) playerY += PSPEED;
      }
      playerY = clampY(playerY);

      // AI paddle
      if (Math.random() < 0.02) aiTargetY = ballY + (Math.random() - 0.5) * PH * 0.6;
      else aiTargetY += (ballY - aiTargetY) * 0.07;
      const aiCenter = aiY + PH / 2;
      aiY += Math.sign(aiTargetY - aiCenter) * Math.min(Math.abs(aiTargetY - aiCenter), PSPEED * 0.8);
      aiY  = clampY(aiY);

      // Ball
      ballX += ballVX;
      ballY += ballVY;

      if (ballY - BR < 0) { ballY = BR;     ballVY *= -1; }
      if (ballY + BR > H) { ballY = H - BR; ballVY *= -1; }

      const maxSpd = W * 0.026;

      // Player hit (left)
      if (ballVX < 0 &&
          ballX - BR < MARGIN + PW &&
          ballY + BR > playerY && ballY - BR < playerY + PH) {
        ballX = MARGIN + PW + BR;
        const hit   = (ballY - (playerY + PH / 2)) / (PH / 2);
        const spd   = Math.min(Math.hypot(ballVX, ballVY) * 1.06, maxSpd);
        const angle = hit * (Math.PI / 3.5);
        ballVX =  Math.cos(angle) * spd;
        ballVY =  Math.sin(angle) * spd;
      }

      // AI hit (right)
      if (ballVX > 0 &&
          ballX + BR > W - MARGIN - PW &&
          ballY + BR > aiY && ballY - BR < aiY + PH) {
        ballX = W - MARGIN - PW - BR;
        const hit   = (ballY - (aiY + PH / 2)) / (PH / 2);
        const spd   = Math.min(Math.hypot(ballVX, ballVY) * 1.06, maxSpd);
        const angle = hit * (Math.PI / 3.5);
        ballVX = -Math.cos(angle) * spd;
        ballVY =  Math.sin(angle) * spd;
      }

      if (ballX + BR < 0)  resetBall(1);
      else if (ballX - BR > W) { playerScore++; resetBall(-1); }
    }

    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, W, H);

      // Center line
      ctx.save();
      ctx.setLineDash([H * 0.025, H * 0.018]);
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.restore();

      // Paddles
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.roundRect(MARGIN, playerY, PW, PH, PW / 2);
      ctx.fill();

      ctx.beginPath();
      ctx.roundRect(W - MARGIN - PW, aiY, PW, PH, PW / 2);
      ctx.fill();

      // Ball
      ctx.beginPath();
      ctx.arc(ballX, ballY, BR, 0, Math.PI * 2);
      ctx.fill();
    }

    function loop(ts) {
      update(ts);
      draw();
      requestAnimationFrame(loop);
    }

    // ── Input ─────────────────────────────────────────────────────
    window.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (state === 'start') startGame();
    });
    window.addEventListener('keyup', e => { keys[e.key] = false; });

    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      activePointer = true;
      pointerY = e.clientY - gameArea.getBoundingClientRect().top;
      if (state === 'start') startGame();
    });

    canvas.addEventListener('pointermove', e => {
      if (!activePointer) return;
      pointerY = e.clientY - gameArea.getBoundingClientRect().top;
    });

    canvas.addEventListener('pointerup',     () => { activePointer = false; pointerY = null; });
    canvas.addEventListener('pointercancel', () => { activePointer = false; pointerY = null; });

    // ── Name form ─────────────────────────────────────────────────
    nameForm.addEventListener('submit', async e => {
      e.preventDefault();
      const name = nameInput.value.trim() || 'Anonymous';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';
      await postScore(name, playerScore);
      await goToStart();
    });

    skipBtn.addEventListener('click', goToStart);

    async function goToStart() {
      state = 'start';
      showScreen('start');
      document.getElementById('lb-body').innerHTML = '<div class="lb-loading">Loading&hellip;</div>';
      const entries = await fetchScores();
      renderLeaderboard(entries);
    }

    // ── Init ──────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      resize();
      if (state !== 'playing') {
        playerY = H / 2 - PH / 2;
        aiY     = H / 2 - PH / 2;
        ballX   = W / 2;
        ballY   = H / 2;
      }
    });

    resize();
    playerY = H / 2 - PH / 2;
    aiY     = H / 2 - PH / 2;
    resetBall();
    showScreen('start');
    fetchScores().then(renderLeaderboard);
    requestAnimationFrame(loop);
  </script>

</body>
</html>
