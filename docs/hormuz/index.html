<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Strait of Hormuz | Glenn Hurley</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      touch-action: none;
      user-select: none;
    }

    #c { display: block; }

    .panel {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 10, 20, 0.90);
      z-index: 10;
    }
    .panel.hidden { display: none; }

    .card {
      background: #0d1f2d;
      border: 2px solid #2a5f8f;
      border-radius: 14px;
      padding: 24px 20px;
      width: min(360px, 92vw);
      color: #e0e8f0;
      text-align: center;
    }

    .card h1 {
      font-size: 1.45rem;
      letter-spacing: 0.06em;
      color: #5bc0f8;
      margin-bottom: 2px;
    }
    .tagline {
      font-size: 0.68rem;
      color: #557799;
      margin-bottom: 18px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .flag-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }
    .flag-opt {
      flex: 1;
      background: #0a1828;
      border: 2px solid #1e3a52;
      border-radius: 10px;
      padding: 10px 6px;
      cursor: pointer;
      color: #c0d8f0;
      transition: border-color .15s, background .15s;
      font-family: inherit;
    }
    .flag-opt .flag-em { font-size: 1.6rem; display: block; line-height: 1; margin-bottom: 5px; }
    .flag-opt .flag-name { font-size: 0.7rem; font-weight: bold; display: block; }
    .flag-opt .flag-note { font-size: 0.56rem; color: #445566; margin-top: 4px; line-height: 1.4; }
    .flag-opt.sel { border-color: #5bc0f8; background: #0a2038; }

    #tanker-name {
      width: 100%;
      background: #0a1828;
      border: 2px solid #1e3a52;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e0e8f0;
      font-family: inherit;
      font-size: 0.9rem;
      text-align: center;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
      outline: none;
      transition: border-color .15s;
    }
    #tanker-name:focus { border-color: #5bc0f8; }
    #tanker-name::placeholder { color: #2a3a4a; }

    .btn-primary {
      width: 100%;
      background: #1a508a;
      border: none;
      border-radius: 8px;
      padding: 13px;
      color: #e0f0ff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-primary:hover { background: #2060a0; }
    .btn-primary:active { background: #104070; }

    .death-msg {
      font-size: 0.78rem;
      color: #cc4444;
      margin-bottom: 14px;
      line-height: 1.6;
      min-height: 2.4em;
    }
    .lb-title { font-size: 1.05rem; color: #5bc0f8; margin-bottom: 12px; letter-spacing: .06em; }

    .lb-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-bottom: 18px; }
    .lb-table th { color: #446677; font-weight: normal; padding: 4px 6px; text-align: left; border-bottom: 1px solid #1e3a52; letter-spacing: .04em; }
    .lb-table td { padding: 5px 6px; color: #a0c0d8; }
    .lb-table tr.you td { color: #ffd700; }
    .lb-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    /* ── Win95 dialog ─────────────────────────────────── */
    #dialog-panel {
      background: transparent;
      pointer-events: none;
      align-items: flex-start;
      padding-top: 22vh;
    }
    #dialog-panel .win95 { pointer-events: auto; }

    .win95 {
      background: #c0c0c0;
      border-top:    2px solid #ffffff;
      border-left:   2px solid #ffffff;
      border-right:  2px solid #404040;
      border-bottom: 2px solid #404040;
      box-shadow: 1px 1px 0 #000;
      width: min(320px, 86vw);
      font-family: 'MS Sans Serif', 'Tahoma', Geneva, sans-serif;
      color: #000;
      animation: w95pop .12s ease-out;
    }
    @keyframes w95pop {
      from { transform: scale(.85); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .win95-tb {
      background: linear-gradient(90deg, #000080 0%, #1084d0 100%);
      color: #fff;
      padding: 3px 4px 2px 6px;
      font-size: 11px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.02em;
    }
    .win95-x {
      background: #c0c0c0;
      border-top:    1px solid #ffffff;
      border-left:   1px solid #ffffff;
      border-right:  1px solid #000000;
      border-bottom: 1px solid #000000;
      width: 16px;
      height: 14px;
      font-size: 11px;
      line-height: 9px;
      font-weight: bold;
      color: #000;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
    }
    .win95-x:active {
      border-top:    1px solid #000000;
      border-left:   1px solid #000000;
      border-right:  1px solid #ffffff;
      border-bottom: 1px solid #ffffff;
    }

    .win95-body {
      padding: 16px 14px 12px;
    }
    .win95-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 18px;
    }
    .win95-icon {
      width: 32px;
      height: 32px;
      background: #ffe000;
      border-top:    2px solid #ffff80;
      border-left:   2px solid #ffff80;
      border-right:  2px solid #806000;
      border-bottom: 2px solid #806000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: bold;
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
    }
    .win95-msg {
      font-size: 12px;
      line-height: 1.45;
      color: #000;
    }
    .win95-msg b { font-weight: bold; }
    .win95-buttons {
      display: flex;
      justify-content: center;
    }
    .win95-btn {
      background: #c0c0c0;
      border-top:    2px solid #ffffff;
      border-left:   2px solid #ffffff;
      border-right:  2px solid #404040;
      border-bottom: 2px solid #404040;
      padding: 4px 22px;
      min-width: 76px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      color: #000;
      outline: 1px dotted #000;
      outline-offset: -4px;
    }
    .win95-btn:active {
      border-top:    2px solid #404040;
      border-left:   2px solid #404040;
      border-right:  2px solid #ffffff;
      border-bottom: 2px solid #ffffff;
      padding: 5px 21px 3px 23px;
    }
  </style>
</head>
<body>

<div class="panel" id="start-panel">
  <div class="card">
    <h1>STRAIT OF HORMUZ</h1>
    <div class="tagline">navigate the world's most contested chokepoint</div>
    <div style="font-size:.63rem;color:#334455;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em;">Select your flag of convenience:</div>
    <div class="flag-row" id="flag-row">
      <button class="flag-opt sel" data-idx="0">
        <span class="flag-em">🇲🇳</span>
        <span class="flag-name">MONGOLIA</span>
        <div class="flag-note">Landlocked<br>since forever</div>
      </button>
      <button class="flag-opt" data-idx="1">
        <span class="flag-em">🇲🇭</span>
        <span class="flag-name">MARSHALL IS.</span>
        <div class="flag-note">Currently<br>sinking</div>
      </button>
      <button class="flag-opt" data-idx="2">
        <span class="flag-em">🇹🇻</span>
        <span class="flag-name">TUVALU</span>
        <div class="flag-note">Pop. 11,000.<br>Mostly fish.</div>
      </button>
    </div>
    <input type="text" id="tanker-name" placeholder="NAME YOUR TANKER" maxlength="22"
           autocomplete="off" spellcheck="false" autocapitalize="characters" />
    <button class="btn-primary" id="deploy-btn">⚓ DEPLOY</button>
  </div>
</div>

<div class="panel hidden" id="lb-panel">
  <div class="card">
    <div class="death-msg" id="death-msg"></div>
    <div class="lb-title">HALL OF FALLEN TANKERS</div>
    <table class="lb-table">
      <thead><tr><th>#</th><th>TANKER</th><th>NM</th><th>DMG</th><th>DATE</th></tr></thead>
      <tbody id="lb-body"></tbody>
    </table>
    <button class="btn-primary" id="replay-btn">⚓ REDEPLOY</button>
  </div>
</div>

<div class="panel hidden" id="dialog-panel">
  <div class="win95">
    <div class="win95-tb">
      <span>USS MANIFEST DESTINY (GOLDEN EDITION)</span>
      <button class="win95-x" id="dialog-x">×</button>
    </div>
    <div class="win95-body">
      <div class="win95-row">
        <div class="win95-icon">!</div>
        <div class="win95-msg" id="dialog-msg"></div>
      </div>
      <div class="win95-buttons">
        <button class="win95-btn" id="dialog-ok">OK</button>
      </div>
    </div>
  </div>
</div>

<canvas id="c"></canvas>

<script>
'use strict';

// ── canvas / scaling ────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const LW = 400, LH = 720;

function fitCanvas() {
  const s = Math.min(window.innerWidth / LW, window.innerHeight / LH);
  canvas.width  = LW;
  canvas.height = LH;
  canvas.style.width  = Math.floor(LW * s) + 'px';
  canvas.style.height = Math.floor(LH * s) + 'px';
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

// ── constants ───────────────────────────────────────────────────
const SHORE_W   = 46;
const WATER_L   = SHORE_W;
const WATER_R   = LW - SHORE_W;
const WATER_W   = WATER_R - WATER_L;
const TW = 36, TH = 80;
const PLAYER_Y  = LH * 0.72;
const PLAYER_SPD = 230;
const BASE_SCROLL = 110;
const MAX_SCROLL  = 310;
const SCROLL_ACCEL = 5;
const NM_PX = 180;
const FINISH_NM = 100;          // strait length — game ends here
const HIT_INVUL = 0.7;          // seconds of invulnerability after a non-fatal hit

// damage per obstacle type (out of 100)
const DMG = {
  mine:    100,   // contact mine = ship-killer
  missile:  45,
  drone:    25,
  boat:     12,   // ramming damage from a fast boat
};

// ── flags ───────────────────────────────────────────────────────
const FLAGS = [
  { emoji: '🇲🇳', name: 'Mongolia' },
  { emoji: '🇲🇭', name: 'Marshall Islands' },
  { emoji: '🇹🇻', name: 'Tuvalu' },
];

// ── game state ──────────────────────────────────────────────────
let state        = 'idle';
let scrollSpeed  = BASE_SCROLL;
let scrollY      = 0;
let distance     = 0;
let selectedFlag = 0;
let tankerName   = 'MV CRUDE JUSTICE';
let deathReason  = '';
let dyingTimer   = 0;
let eatenTimer   = 0;
let leaderboardShown = false;

let player    = { x: LW / 2, y: PLAYER_Y };
let obstacles = [];
let particles = [];
let bullets   = [];
let spawnClock    = 0;
let spawnInterval = 1.8;
let boss          = null;
let bossSpawned   = false;
let bossTarget    = FINISH_NM;
let damage        = 0;
let invulTimer    = 0;
let hitFlash      = 0;

// ── input ───────────────────────────────────────────────────────
const keys   = { left: false, right: false };
const touch  = { left: false, right: false };

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keys.left  = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});

function touchSide(clientX) {
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left) / rect.width * LW;
  return x < LW / 2 ? 'left' : 'right';
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) touch[touchSide(t.clientX)] = true;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touch.left = touch.right = false;
  for (const t of e.touches) touch[touchSide(t.clientX)] = true;
}, { passive: false });

canvas.addEventListener('touchcancel', () => { touch.left = touch.right = false; });

canvas.addEventListener('mousedown', e => { touch[touchSide(e.clientX)] = true; });
window.addEventListener('mouseup',   () => { touch.left = touch.right = false; });

// ── obstacle definitions ─────────────────────────────────────────
const OBS = [
  { id: 'mine',    label: 'NAVAL MINE', color: '#aaaaaa', r: 18, baseSpeed:   0, pattern: 'drift',  weight: 3 },
  { id: 'boat',    label: 'IRGCN BOAT', color: '#bbb8aa', r: 12, baseSpeed: 170, pattern: 'zigzag', weight: 3 },
  { id: 'drone',   label: 'SHAHED-136', color: '#d4cdb0', r: 11, baseSpeed:  95, pattern: 'sine',   weight: 2 },
  { id: 'missile', label: 'ANTI-SHIP',  color: '#ff4400', r:  7, baseSpeed: 210, pattern: 'homing', weight: 2 },
];

function pickType() {
  const progress = Math.min(distance / (BOSS_THRESHOLD * NM_PX), 1);
  const pool = [];
  for (const t of OBS) {
    let w = t.weight;
    if (t.id === 'missile' || t.id === 'drone') w += progress * 3;
    for (let i = 0; i < Math.round(w); i++) pool.push(t);
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

function spawnObs() {
  const def = pickType();
  const margin = SHORE_W + def.r + 24;
  obstacles.push({
    type: def,
    x: margin + Math.random() * (LW - margin * 2),
    y: -def.r - 10,
    vx: (Math.random() - 0.5) * 40,
    vy: def.baseSpeed,
    phase: Math.random() * Math.PI * 2,
    driftDir: Math.random() < 0.5 ? 1 : -1,
    driftClock: 0,
    age: 0,
    r: def.r,
    shootClock: def.id === 'boat' ? 0.6 + Math.random() * 0.6 : 0,
    dead: false,
  });
}

function fireBullet(o) {
  // aim toward the tanker but always miss — these are warning shots
  const ang0 = Math.atan2(player.y - o.y, player.x - o.x);
  const miss = (Math.random() < 0.5 ? -1 : 1) * (0.16 + Math.random() * 0.12);
  const ang  = ang0 + miss;
  const spd  = 420;
  bullets.push({
    x: o.x,
    y: o.y + 14,           // muzzle of the foredeck gun
    vx: Math.cos(ang) * spd,
    vy: Math.sin(ang) * spd,
    age: 0,
    life: 1.4,
  });
}

// ── particles ────────────────────────────────────────────────────
function boom(x, y, color, n = 14) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 70 + Math.random() * 200;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
                     r: 2 + Math.random() * 5, life: 0.5 + Math.random() * 0.5,
                     age: 0, color });
  }
}

// ── draw helpers ─────────────────────────────────────────────────
function drawWater() {
  ctx.fillStyle = '#0c2540';
  ctx.fillRect(WATER_L, 0, WATER_W, LH);

  ctx.save();
  const sp = scrollY % 32;
  ctx.strokeStyle = 'rgba(100,180,255,0.05)';
  ctx.lineWidth = 1;
  for (let y = -32 + sp; y < LH + 32; y += 32) {
    ctx.beginPath();
    for (let x = WATER_L; x <= WATER_R; x += 5) {
      const wx = Math.sin(x * 0.025 + y * 0.018) * 3;
      x === WATER_L ? ctx.moveTo(x, y + wx) : ctx.lineTo(x, y + wx);
    }
    ctx.stroke();
  }
  ctx.restore();
}

// ── shore geometry (wavy, scrolls with the strait) ──────────────
function shoreLeftAt(screenY) {
  const wy = screenY - scrollY;
  return SHORE_W + Math.sin(wy * 0.0085 + 0.4) * 14
                 + Math.sin(wy * 0.024  + 1.7) * 7;
}
function shoreRightAt(screenY) {
  const wy = screenY - scrollY;
  return LW - SHORE_W - Math.sin(wy * 0.0095 + 1.2) * 14
                       - Math.sin(wy * 0.027  + 4.1) * 7;
}

function _hash01(n) {
  n = (Math.sin(n * 12.9898) * 43758.5453);
  return n - Math.floor(n);
}

function drawShores() {
  const step = 4;

  // base land — left (sandy tan)
  const llg = ctx.createLinearGradient(0, 0, SHORE_W * 1.4, 0);
  llg.addColorStop(0, '#7a5028');
  llg.addColorStop(1, '#c89058');
  ctx.fillStyle = llg;
  ctx.beginPath();
  ctx.moveTo(0, -step);
  for (let y = -step; y <= LH + step; y += step) ctx.lineTo(shoreLeftAt(y), y);
  ctx.lineTo(0, LH + step);
  ctx.closePath();
  ctx.fill();

  // base land — right (terracotta)
  const rlg = ctx.createLinearGradient(WATER_R - 6, 0, LW, 0);
  rlg.addColorStop(0, '#a85030');
  rlg.addColorStop(1, '#722810');
  ctx.fillStyle = rlg;
  ctx.beginPath();
  ctx.moveTo(LW, -step);
  for (let y = -step; y <= LH + step; y += step) ctx.lineTo(shoreRightAt(y), y);
  ctx.lineTo(LW, LH + step);
  ctx.closePath();
  ctx.fill();

  // beach strip (lighter sand near the water on the left shore)
  ctx.fillStyle = '#dcb478';
  ctx.beginPath();
  for (let y = -step; y <= LH + step; y += step) {
    const sx = shoreLeftAt(y);
    if (y === -step) ctx.moveTo(sx, y);
    else ctx.lineTo(sx, y);
  }
  for (let y = LH + step; y >= -step; y -= step) {
    ctx.lineTo(shoreLeftAt(y) - 6, y);
  }
  ctx.closePath();
  ctx.fill();

  // dry mud / cracked earth strip on the right (Iranian) shore
  ctx.fillStyle = '#c46a44';
  ctx.beginPath();
  for (let y = -step; y <= LH + step; y += step) {
    const sx = shoreRightAt(y);
    if (y === -step) ctx.moveTo(sx, y);
    else ctx.lineTo(sx, y);
  }
  for (let y = LH + step; y >= -step; y -= step) {
    ctx.lineTo(shoreRightAt(y) + 6, y);
  }
  ctx.closePath();
  ctx.fill();

  // surf line — moving foam at the water's edge
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 1.3;
  ctx.beginPath();
  for (let y = 0; y <= LH; y += 3) {
    const sx = shoreLeftAt(y);
    const wob = Math.sin((y + scrollY) * 0.35) * 0.7;
    y === 0 ? ctx.moveTo(sx + wob, y) : ctx.lineTo(sx + wob, y);
  }
  ctx.stroke();
  ctx.beginPath();
  for (let y = 0; y <= LH; y += 3) {
    const sx = shoreRightAt(y);
    const wob = Math.sin((y + scrollY) * 0.31 + 2) * 0.7;
    y === 0 ? ctx.moveTo(sx + wob, y) : ctx.lineTo(sx + wob, y);
  }
  ctx.stroke();

  // shore decorations + labels
  drawShoreDetails();
  drawShoreLabels();
}

function drawShoreDetails() {
  const SP = 50;
  const minWY = Math.floor((-40 - scrollY) / SP) * SP;
  const maxWY = Math.ceil ((LH + 40 - scrollY) / SP) * SP;

  for (let wy = minWY; wy <= maxWY; wy += SP) {
    const sy = wy + scrollY;
    if (sy < -20 || sy > LH + 20) continue;

    // LEFT (Oman/UAE)
    {
      const ht = _hash01(wy * 0.137 + 13);
      const hp = _hash01(wy * 0.091 + 21);
      const sx = shoreLeftAt(sy) - 10 - hp * (SHORE_W * 0.6);
      if (sx > 5) drawShoreObj(sx, sy, ht, 'left', wy);
    }
    // RIGHT (Iran)
    {
      const ht = _hash01(wy * 0.183 + 41);
      const hp = _hash01(wy * 0.127 + 71);
      const sx = shoreRightAt(sy) + 10 + hp * (SHORE_W * 0.6);
      if (sx < LW - 5) drawShoreObj(sx, sy, ht, 'right', wy);
    }
  }
}

function drawShoreObj(x, y, t, side, wy) {
  ctx.save();
  ctx.translate(x, y);

  if (t < 0.42) {
    // palm tree (top-down — fronds spreading from a small trunk)
    ctx.strokeStyle = '#3a6520';
    ctx.lineWidth = 1.4;
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 + _hash01(wy + i) * 0.4;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a) * 5, Math.sin(a) * 5);
      ctx.stroke();
    }
    ctx.fillStyle = '#5a3818';
    ctx.beginPath(); ctx.arc(0, 0, 1.6, 0, Math.PI * 2); ctx.fill();
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.arc(1, 1, 5, 0, Math.PI * 2); ctx.fill();
  } else if (t < 0.78) {
    // rocks — small cluster
    ctx.fillStyle = side === 'left' ? '#7a5028' : '#5a2818';
    ctx.beginPath(); ctx.arc(0, 0, 3.2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = side === 'left' ? '#a07a48' : '#7a3820';
    ctx.beginPath(); ctx.arc(2, 1, 1.8, 0, Math.PI * 2); ctx.fill();
    if (_hash01(wy * 0.5 + 7) < 0.5) {
      ctx.fillStyle = side === 'left' ? '#603a18' : '#421808';
      ctx.beginPath(); ctx.arc(-2, 2, 1.4, 0, Math.PI * 2); ctx.fill();
    }
  } else {
    // small building (whitewashed hut on Oman side, terracotta on Iran side)
    ctx.fillStyle = side === 'left' ? '#ece4c8' : '#c46838';
    ctx.fillRect(-4, -3, 8, 7);
    // flat roof
    ctx.fillStyle = side === 'left' ? '#a87838' : '#722810';
    ctx.fillRect(-4, -3, 8, 1.5);
    // door
    ctx.fillStyle = '#222';
    ctx.fillRect(-1, 1, 2, 3);
  }

  ctx.restore();
}

function drawShoreLabels() {
  const SP = 220;
  const startWY = Math.floor((-40 - scrollY) / SP) * SP;
  const endWY   = Math.ceil ((LH + 40 - scrollY) / SP) * SP;

  ctx.save();
  ctx.font = 'bold 13px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (let wy = startWY; wy <= endWY; wy += SP) {
    const sy = wy + scrollY;
    if (sy < 70 || sy > LH - 60) continue;

    // LEFT — OMAN / UAE  (centered in the visible left land width)
    ctx.save();
    ctx.translate(shoreLeftAt(sy) * 0.5, sy);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillText('OMAN / UAE',  1, 1);
    ctx.fillText('OMAN / UAE', -1, 1);
    ctx.fillText('OMAN / UAE',  1,-1);
    ctx.fillText('OMAN / UAE', -1,-1);
    ctx.fillStyle = '#fff2d8';
    ctx.fillText('OMAN / UAE', 0, 0);
    ctx.restore();

    // RIGHT — IRAN  (centered in the visible right land width)
    ctx.save();
    ctx.translate((LW + shoreRightAt(sy)) * 0.5, sy);
    ctx.rotate(Math.PI / 2);
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillText('I R A N',  1, 1);
    ctx.fillText('I R A N', -1, 1);
    ctx.fillText('I R A N',  1,-1);
    ctx.fillText('I R A N', -1,-1);
    ctx.fillStyle = '#ffe0c0';
    ctx.fillText('I R A N', 0, 0);
    ctx.restore();
  }

  ctx.restore();
}

function drawTanker(x, y, flagEmoji, alpha) {
  ctx.save();
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  ctx.translate(x, y);

  const hw = TW / 2, hh = TH / 2;

  // wake
  const wg = ctx.createLinearGradient(0, hh, 0, hh + 50);
  wg.addColorStop(0, 'rgba(255,255,255,0.20)');
  wg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = wg;
  ctx.beginPath();
  ctx.moveTo(-hw + 2, hh - 1);
  ctx.lineTo(-hw - 14, hh + 50);
  ctx.lineTo(hw + 14, hh + 50);
  ctx.lineTo(hw - 2, hh - 1);
  ctx.closePath();
  ctx.fill();

  // hull (dark maroon — typical product tanker)
  ctx.fillStyle = '#5a2422';
  ctx.beginPath();
  ctx.moveTo(-hw, hh - 3);
  ctx.quadraticCurveTo(-hw, hh, -hw + 4, hh);
  ctx.lineTo(hw - 4, hh);
  ctx.quadraticCurveTo(hw, hh, hw, hh - 3);
  ctx.lineTo(hw, -hh + 16);
  ctx.quadraticCurveTo(hw, -hh + 6, hw - 5, -hh + 3);
  ctx.lineTo(2, -hh);
  ctx.lineTo(-2, -hh);
  ctx.lineTo(-hw + 5, -hh + 3);
  ctx.quadraticCurveTo(-hw, -hh + 6, -hw, -hh + 16);
  ctx.closePath();
  ctx.fill();

  // hull outline
  ctx.strokeStyle = '#1a0608';
  ctx.lineWidth = 1;
  ctx.stroke();

  // boot topping (red anti-fouling stripe at waterline)
  ctx.strokeStyle = '#aa1a08';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-hw + 1, -hh + 16); ctx.lineTo(-hw + 1, hh - 4);
  ctx.moveTo( hw - 1, -hh + 16); ctx.lineTo( hw - 1, hh - 4);
  ctx.stroke();

  // forecastle deck (raised area at bow)
  ctx.fillStyle = '#3a1a18';
  ctx.beginPath();
  ctx.moveTo(-hw + 4, -hh + 14);
  ctx.lineTo(-hw + 4, -hh + 22);
  ctx.lineTo( hw - 4, -hh + 22);
  ctx.lineTo( hw - 4, -hh + 14);
  ctx.lineTo( hw - 5, -hh + 4);
  ctx.lineTo(0, -hh + 1);
  ctx.lineTo(-hw + 5, -hh + 4);
  ctx.closePath();
  ctx.fill();

  // anchor windlass detail at bow
  ctx.fillStyle = '#222';
  ctx.fillRect(-3, -hh + 10, 6, 3);

  // main cargo deck (green non-skid coating, common on tankers)
  ctx.fillStyle = '#2c4220';
  ctx.fillRect(-hw + 3, -hh + 22, TW - 6, hh + (hh - 24));
  // deck plating seams
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 0.5;
  for (const sy of [-hh + 30, -hh + 50, -hh + 70, hh - 30]) {
    ctx.beginPath();
    ctx.moveTo(-hw + 3, sy);
    ctx.lineTo( hw - 3, sy);
    ctx.stroke();
  }

  // central pipe manifold running fore-to-aft
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -hh + 22);
  ctx.lineTo(0, hh - 24);
  ctx.stroke();
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.moveTo(0, -hh + 22);
  ctx.lineTo(0, hh - 24);
  ctx.stroke();

  // cargo tank hatches (two rows along deck)
  ctx.fillStyle = '#1f1a0a';
  for (const ty of [-hh + 30, -hh + 44, -hh + 58, hh - 32]) {
    ctx.beginPath(); ctx.arc(-7, ty, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 7, ty, 3, 0, Math.PI * 2); ctx.fill();
  }
  // midship manifold cross-pipe
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-hw + 4, -2);
  ctx.lineTo( hw - 4, -2);
  ctx.stroke();

  // bridge wings (overhanging platforms)
  ctx.fillStyle = '#d8d8d0';
  ctx.fillRect(-hw + 1, hh - 19, 4, 6);
  ctx.fillRect( hw - 5, hh - 19, 4, 6);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(-hw + 1, hh - 19, 4, 6);
  ctx.strokeRect( hw - 5, hh - 19, 4, 6);

  // lifeboats — orange, on davits flanking the accommodation block
  ctx.fillStyle = '#ff7700';
  ctx.fillRect(-hw + 0.5, hh - 28, 5, 7);
  ctx.fillRect( hw - 5.5, hh - 28, 5, 7);
  ctx.strokeStyle = '#882200';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(-hw + 0.5, hh - 28, 5, 7);
  ctx.strokeRect( hw - 5.5, hh - 28, 5, 7);
  // davit lines
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.moveTo(-hw + 3, hh - 28); ctx.lineTo(-hw + 3, hh - 32);
  ctx.moveTo( hw - 3, hh - 28); ctx.lineTo( hw - 3, hh - 32);
  ctx.stroke();

  // accommodation block at the STERN — white, with windows
  ctx.fillStyle = '#e8e8e0';
  ctx.fillRect(-11, hh - 22, 22, 14);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 0.6;
  ctx.strokeRect(-11, hh - 22, 22, 14);

  // bridge windows (top row)
  ctx.fillStyle = '#1a3a55';
  ctx.fillRect(-9, hh - 21, 18, 2.5);
  // lower deck windows
  ctx.fillStyle = '#444';
  for (let i = -8; i <= 8; i += 4) {
    ctx.fillRect(i - 0.5, hh - 16, 1.5, 1.5);
    ctx.fillRect(i - 0.5, hh - 13, 1.5, 1.5);
  }

  // funnel behind accommodation
  ctx.fillStyle = '#666';
  ctx.fillRect(-3.5, hh - 8, 7, 5);
  ctx.fillStyle = '#cc2200';
  ctx.fillRect(-3.5, hh - 8, 7, 1.8);
  ctx.fillStyle = '#222';
  ctx.fillRect(-3.5, hh - 4, 7, 1);

  // tiny flag on bridge roof
  ctx.font = '9px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(flagEmoji, 0, hh - 26);

  ctx.restore();
}

function drawMine(x, y, r, age) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(age * 0.25);

  // body — matte black with subtle highlight
  const bg = ctx.createRadialGradient(-r * 0.4, -r * 0.4, 1, 0, 0, r);
  bg.addColorStop(0, '#3a3a3a');
  bg.addColorStop(0.6, '#101010');
  bg.addColorStop(1, '#000000');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // rust patches
  ctx.fillStyle = 'rgba(140, 60, 20, 0.5)';
  ctx.beginPath();
  ctx.arc(r * 0.25, r * 0.15, r * 0.22, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(-r * 0.4, r * 0.3, r * 0.14, 0, Math.PI * 2);
  ctx.fill();

  // horns / contact spikes
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    ctx.lineTo(Math.cos(a) * (r + 7), Math.sin(a) * (r + 7));
    ctx.stroke();
    // lead horn tip
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.arc(Math.cos(a) * (r + 8), Math.sin(a) * (r + 8), 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }

  ctx.restore();
}

function drawSpeedboat(x, y, r, age) {
  ctx.save();
  ctx.translate(x, y);
  // bow points DOWN — boat is charging the tanker

  // wake spray behind (above the boat)
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1.5;
  const wob = Math.sin(age * 14) * 1.5;
  ctx.beginPath();
  ctx.moveTo(-r * 0.7, -r * 1.2); ctx.lineTo(-r * 1.1 + wob, -r * 2.0);
  ctx.moveTo( r * 0.7, -r * 1.2); ctx.lineTo( r * 1.1 - wob, -r * 2.0);
  ctx.stroke();

  // hull (light gray — typical IRGCN fast boat)
  ctx.fillStyle = '#b8b4a8';
  ctx.beginPath();
  ctx.moveTo(0, r * 1.7);              // pointed bow (front, downward)
  ctx.lineTo(r * 0.75, r * 0.6);
  ctx.lineTo(r * 0.75, -r * 1.3);      // stern right
  ctx.lineTo(-r * 0.75, -r * 1.3);     // stern left
  ctx.lineTo(-r * 0.75, r * 0.6);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = 1;
  ctx.stroke();

  // green stripe along the gunwale (Iranian flag accent)
  ctx.fillStyle = '#1a7a2a';
  ctx.fillRect(-r * 0.75, -r * 0.4, r * 1.5, 1.5);
  ctx.fillStyle = '#cc2222';
  ctx.fillRect(-r * 0.75, -r * 0.2, r * 1.5, 1);

  // center console / cabin
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(-r * 0.4, -r * 0.7, r * 0.8, r * 0.55);
  ctx.fillStyle = '#1a3a55';
  ctx.fillRect(-r * 0.32, -r * 0.62, r * 0.64, 1.5);  // windshield

  // crew dots
  ctx.fillStyle = '#3a2410';
  ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.05, 1.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( r * 0.3, -r * 0.05, 1.4, 0, Math.PI * 2); ctx.fill();

  // mounted heavy machine gun on foredeck
  ctx.fillStyle = '#222';
  // mount base
  ctx.beginPath(); ctx.arc(0, r * 0.7, r * 0.22, 0, Math.PI * 2); ctx.fill();
  // gun barrel pointing forward
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2.2;
  ctx.beginPath();
  ctx.moveTo(0, r * 0.7);
  ctx.lineTo(0, r * 1.4);
  ctx.stroke();
  // muzzle tip
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.arc(0, r * 1.4, 1.3, 0, Math.PI * 2); ctx.fill();

  // outboard motors at stern
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-r * 0.5, -r * 1.4, r * 0.25, r * 0.25);
  ctx.fillRect( r * 0.25, -r * 1.4, r * 0.25, r * 0.25);

  ctx.restore();
}

function drawDrone(x, y, r, age) {
  ctx.save();
  ctx.translate(x, y);
  // Shahed-136 — delta wedge, nose pointing DOWN (toward target)

  const R = r * 1.6;

  // delta wing body — pale beige
  ctx.fillStyle = '#d4cdb0';
  ctx.beginPath();
  ctx.moveTo(0, R);                    // nose (pointed, downward)
  ctx.lineTo(R * 0.95, -R * 0.45);     // right wingtip
  ctx.lineTo(R * 0.32, -R * 0.6);      // back-right
  ctx.lineTo(-R * 0.32, -R * 0.6);     // back-left
  ctx.lineTo(-R * 0.95, -R * 0.45);    // left wingtip
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#5a4f30';
  ctx.lineWidth = 1;
  ctx.stroke();

  // fuselage centerline (slightly darker spine)
  ctx.fillStyle = '#aea582';
  ctx.beginPath();
  ctx.moveTo(0, R * 0.95);
  ctx.lineTo(R * 0.12, -R * 0.55);
  ctx.lineTo(-R * 0.12, -R * 0.55);
  ctx.closePath();
  ctx.fill();

  // V-tail fins at the rear
  ctx.fillStyle = '#9a8e68';
  ctx.beginPath();
  ctx.moveTo(-R * 0.32, -R * 0.6);
  ctx.lineTo(-R * 0.55, -R * 0.92);
  ctx.lineTo(-R * 0.18, -R * 0.6);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo( R * 0.32, -R * 0.6);
  ctx.lineTo( R * 0.55, -R * 0.92);
  ctx.lineTo( R * 0.18, -R * 0.6);
  ctx.closePath();
  ctx.fill();

  // rear-mounted propeller (motion blur ring + spinning blades)
  ctx.strokeStyle = 'rgba(40,30,15,0.5)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.arc(0, -R * 0.7, R * 0.28, 0, Math.PI * 2);
  ctx.stroke();
  // spinning blade
  ctx.strokeStyle = 'rgba(20,15,10,0.85)';
  ctx.lineWidth = 1.4;
  const sa = age * 32;
  ctx.beginPath();
  ctx.moveTo(Math.cos(sa) * R * 0.28, -R * 0.7 + Math.sin(sa) * R * 0.28);
  ctx.lineTo(-Math.cos(sa) * R * 0.28, -R * 0.7 - Math.sin(sa) * R * 0.28);
  ctx.stroke();
  // hub
  ctx.fillStyle = '#3a3020';
  ctx.beginPath();
  ctx.arc(0, -R * 0.7, 1.3, 0, Math.PI * 2);
  ctx.fill();

  // nose camera dot
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(0, R * 0.78, 1.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawMissile(x, y, r, vy, vx) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.atan2(vy, vx) + Math.PI / 2);

  ctx.fillStyle = '#ff2200';
  ctx.fillRect(-r * 0.55, -r * 2, r * 1.1, r * 3.5);

  ctx.fillStyle = '#ff6600';
  ctx.beginPath();
  ctx.moveTo(-r * 0.55, -r * 2);
  ctx.lineTo(r * 0.55, -r * 2);
  ctx.lineTo(0, -r * 3.4);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#cc1100';
  ctx.beginPath();
  ctx.moveTo(-r * 0.55, r * 1.2); ctx.lineTo(-r * 1.5, r * 2.2); ctx.lineTo(-r * 0.55, r * 2.2);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(r * 0.55, r * 1.2); ctx.lineTo(r * 1.5, r * 2.2); ctx.lineTo(r * 0.55, r * 2.2);
  ctx.closePath(); ctx.fill();

  const eg = ctx.createLinearGradient(0, r * 1.5, 0, r * 3.8);
  eg.addColorStop(0, 'rgba(255,180,0,0.9)');
  eg.addColorStop(1, 'rgba(255,80,0,0)');
  ctx.fillStyle = eg;
  ctx.beginPath();
  ctx.ellipse(0, r * 2.4, r * 0.7, r * 1.4, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawTriTurret(yc, dir) {
  // dir = -1 means barrels point UP (toward bow / negative y)
  // dir = +1 means barrels point DOWN (toward stern / positive y)
  const tr = 11;
  // barbette shadow
  ctx.fillStyle = '#604000';
  ctx.beginPath();
  ctx.arc(0, yc, tr + 2, 0, Math.PI * 2);
  ctx.fill();
  // turret body
  const tg = ctx.createRadialGradient(-3, yc - 3, 1, 0, yc, tr);
  tg.addColorStop(0, '#f8d850');
  tg.addColorStop(1, '#a07a00');
  ctx.fillStyle = tg;
  ctx.beginPath();
  ctx.arc(0, yc, tr, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#5a4000';
  ctx.lineWidth = 1;
  ctx.stroke();
  // 3 barrels
  ctx.fillStyle = '#1a1a1a';
  const barrelLen = 16;
  const tipY = yc + dir * (tr + barrelLen);
  for (const ox of [-4, 0, 4]) {
    ctx.fillRect(ox - 1.4, dir < 0 ? tipY : yc, 2.8, barrelLen);
  }
  // muzzle ring
  ctx.fillStyle = '#000';
  for (const ox of [-4, 0, 4]) {
    ctx.beginPath();
    ctx.arc(ox, tipY, 1.4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBoss(b) {
  ctx.save();
  ctx.translate(b.x, b.y);

  const bw = 60, bh = 200;
  const hw = bw / 2, hh = bh / 2;

  // golden glow
  const gg = ctx.createRadialGradient(0, 0, 30, 0, 0, bh * 0.9);
  gg.addColorStop(0, 'rgba(255,215,0,0.32)');
  gg.addColorStop(0.5, 'rgba(255,165,0,0.12)');
  gg.addColorStop(1, 'rgba(255,165,0,0)');
  ctx.fillStyle = gg;
  ctx.fillRect(-bw, -bh, bw * 2, bh * 2);

  // bow wake
  const wg = ctx.createLinearGradient(0, -hh - 4, 0, -hh - 60);
  wg.addColorStop(0, 'rgba(255,255,255,0.30)');
  wg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = wg;
  ctx.beginPath();
  ctx.moveTo(-6, -hh + 2);
  ctx.lineTo(-hw - 18, -hh - 50);
  ctx.lineTo(hw + 18, -hh - 50);
  ctx.lineTo(6, -hh + 2);
  ctx.closePath();
  ctx.fill();

  // hull (golden)
  const hullG = ctx.createLinearGradient(-hw, 0, hw, 0);
  hullG.addColorStop(0, '#a87808');
  hullG.addColorStop(0.5, '#d8a418');
  hullG.addColorStop(1, '#a87808');
  ctx.fillStyle = hullG;
  ctx.beginPath();
  ctx.moveTo(-hw, hh - 2);
  ctx.quadraticCurveTo(-hw, hh, -hw + 4, hh);
  ctx.lineTo(hw - 4, hh);
  ctx.quadraticCurveTo(hw, hh, hw, hh - 2);
  ctx.lineTo(hw, -hh + 38);
  ctx.quadraticCurveTo(hw, -hh + 12, hw - 6, -hh + 6);
  ctx.lineTo(2, -hh);
  ctx.lineTo(-2, -hh);
  ctx.lineTo(-hw + 6, -hh + 6);
  ctx.quadraticCurveTo(-hw, -hh + 12, -hw, -hh + 38);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#3a2800';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // teak deck (slightly darker, matte)
  ctx.fillStyle = '#8a6818';
  ctx.beginPath();
  ctx.moveTo(-hw + 4, hh - 3);
  ctx.lineTo(hw - 4, hh - 3);
  ctx.lineTo(hw - 4, -hh + 40);
  ctx.lineTo(hw - 8, -hh + 12);
  ctx.lineTo(0, -hh + 4);
  ctx.lineTo(-hw + 8, -hh + 12);
  ctx.lineTo(-hw + 4, -hh + 40);
  ctx.closePath();
  ctx.fill();

  // forecastle anchor + cleats
  ctx.fillStyle = '#222';
  ctx.fillRect(-2.5, -hh + 16, 5, 4);
  ctx.fillRect(-7, -hh + 22, 2, 2);
  ctx.fillRect(5, -hh + 22, 2, 2);

  // FORWARD TURRETS — 2 superfiring (Iowa-class style)
  drawTriTurret(-hh + 38, -1);   // turret 1 (lower, barrels up)
  drawTriTurret(-hh + 64, -1);   // turret 2 (raised, barrels up)

  // CONNING / BRIDGE TOWER (centered, layered)
  // base superstructure
  ctx.fillStyle = '#9a7008';
  ctx.fillRect(-hw + 10, -hh + 80, bw - 20, 46);
  ctx.strokeStyle = '#5a4000';
  ctx.lineWidth = 1;
  ctx.strokeRect(-hw + 10, -hh + 80, bw - 20, 46);
  // bridge wings
  ctx.fillStyle = '#a87808';
  ctx.fillRect(-hw + 4, -hh + 84, 6, 10);
  ctx.fillRect(hw - 10, -hh + 84, 6, 10);
  // pilot house
  ctx.fillStyle = '#c89818';
  ctx.fillRect(-14, -hh + 84, 28, 12);
  // bridge windows
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-12, -hh + 86, 24, 2);
  // mast / radar
  ctx.strokeStyle = '#3a2800';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, -hh + 96);
  ctx.lineTo(0, -hh + 110);
  ctx.stroke();
  // radar bar
  ctx.beginPath();
  ctx.moveTo(-7, -hh + 102);
  ctx.lineTo(7, -hh + 102);
  ctx.stroke();
  // radome
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(0, -hh + 100, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // smokestack
  ctx.fillStyle = '#5a4000';
  ctx.fillRect(-7, -hh + 112, 14, 14);
  ctx.fillStyle = '#3a2800';
  ctx.fillRect(-7, -hh + 112, 14, 2);
  // stack badge — gold star
  ctx.fillStyle = '#ffe040';
  ctx.font = 'bold 9px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('★', 0, -hh + 119);

  // SECONDARY GUNS (5-inch mounts on the sides)
  ctx.fillStyle = '#7a5800';
  for (const sy of [-hh + 130, -hh + 144]) {
    ctx.beginPath();
    ctx.arc(-hw + 6, sy, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(hw - 6, sy, 3.5, 0, Math.PI * 2);
    ctx.fill();
    // tiny barrels pointing outward
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-hw + 6, sy); ctx.lineTo(-hw + 1, sy);
    ctx.moveTo( hw - 6, sy); ctx.lineTo( hw - 1, sy);
    ctx.stroke();
  }

  // AFT TURRET — 1 (barrels point toward stern)
  drawTriTurret(hh - 36, 1);

  // helipad on aft deck
  ctx.strokeStyle = '#ffe040';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, hh - 14, 7, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = '#ffe040';
  ctx.font = 'bold 8px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('H', 0, hh - 14);

  // hull name plate (very small)
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 6px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('USS M.D.', 0, -hh + 70);

  ctx.restore();
}

function drawHUD() {
  const nm = Math.floor(distance / NM_PX);
  const HUD_H = 46;

  ctx.save();
  // background bar
  const hg = ctx.createLinearGradient(0, 0, 0, HUD_H);
  hg.addColorStop(0, 'rgba(0,0,0,0.7)');
  hg.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = hg;
  ctx.fillRect(0, 0, LW, HUD_H);
  // bottom border
  ctx.strokeStyle = 'rgba(91,192,248,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, HUD_H); ctx.lineTo(LW, HUD_H); ctx.stroke();

  ctx.textBaseline = 'middle';

  // top row — tanker name (left) and NM (right)
  ctx.font = 'bold 11px Courier New';
  ctx.fillStyle = '#5bc0f8';
  ctx.textAlign = 'left';
  ctx.fillText(FLAGS[selectedFlag].emoji + ' ' + tankerName.toUpperCase(), 8, 13);

  ctx.textAlign = 'right';
  const nmStr = nm + ' / ' + FINISH_NM + ' NM';
  ctx.fillStyle = nm >= FINISH_NM ? '#ffd700' : '#5bc0f8';
  ctx.fillText(nmStr, LW - 8, 13);

  // distance progress bar (under NM, right-aligned)
  const pbW = 150, pbH = 5, pbX = LW - 8 - pbW, pbY = 32;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(pbX, pbY, pbW, pbH);
  ctx.fillStyle = '#2a7fbf';
  ctx.fillRect(pbX, pbY, pbW * (distance / (FINISH_NM * NM_PX)), pbH);
  ctx.strokeStyle = 'rgba(91,192,248,0.4)';
  ctx.strokeRect(pbX + 0.5, pbY + 0.5, pbW - 1, pbH - 1);

  // damage meter (left, under name)
  const dmgW = 150, dmgH = 9, dmgX = 8, dmgY = 30;
  // label
  ctx.font = 'bold 8px Courier New';
  ctx.fillStyle = '#88a4b8';
  ctx.textAlign = 'left';
  ctx.fillText('HULL', dmgX, dmgY + dmgH / 2);
  const barX = dmgX + 28;

  // back
  ctx.fillStyle = '#0a1620';
  ctx.fillRect(barX, dmgY, dmgW, dmgH);
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.strokeRect(barX + 0.5, dmgY + 0.5, dmgW - 1, dmgH - 1);

  // fill
  const dmgPct = damage / 100;
  let dmgCol = '#22cc44';
  if (dmgPct > 0.4) dmgCol = '#ddaa00';
  if (dmgPct > 0.7) dmgCol = '#cc3300';
  // fill from RIGHT toward left as damage rises (hull is "depleted")
  const remW = dmgW * (1 - dmgPct);
  ctx.fillStyle = dmgCol;
  ctx.fillRect(barX, dmgY, remW, dmgH);
  // segment ticks every 10%
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 10; i++) {
    const tx = barX + (dmgW * i / 10);
    ctx.beginPath(); ctx.moveTo(tx, dmgY); ctx.lineTo(tx, dmgY + dmgH); ctx.stroke();
  }

  // damage % text
  ctx.font = 'bold 8px Courier New';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'right';
  ctx.fillText(Math.floor(100 - damage) + '%', barX + dmgW - 3, dmgY + dmgH / 2 + 0.5);

  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    const a = 1 - p.age / p.life;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * a + 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawBullets() {
  for (const b of bullets) {
    const a = 1 - b.age / b.life;
    const tx = b.x - b.vx * 0.022;
    const ty = b.y - b.vy * 0.022;
    ctx.save();
    ctx.globalAlpha = a * 0.5;
    ctx.strokeStyle = '#ffcc40';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(b.x, b.y); ctx.lineTo(tx, ty);
    ctx.stroke();
    ctx.globalAlpha = a;
    ctx.strokeStyle = '#fff8a0';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y); ctx.lineTo(tx, ty);
    ctx.stroke();
    ctx.restore();
  }
}

// ── update ───────────────────────────────────────────────────────
function updateParticles(dt) {
  for (const p of particles) {
    p.age += dt;
    p.x  += p.vx * dt;
    p.y  += p.vy * dt;
    p.vy += 50 * dt;
  }
  particles = particles.filter(p => p.age < p.life);
}

function updateObs(o, dt) {
  o.age += dt;
  o.y += (o.vy + scrollSpeed) * dt;

  switch (o.type.pattern) {
    case 'drift':
      o.driftClock += dt;
      if (o.driftClock > 1.6) { o.driftDir *= -1; o.driftClock = 0; }
      o.x += o.driftDir * 20 * dt;
      break;
    case 'zigzag':
      o.vx = Math.sin(o.age * 3 + o.phase) * 160;
      o.x += o.vx * dt;
      break;
    case 'sine':
      o.x += Math.sin(o.age * 2 + o.phase) * 130 * dt;
      break;
    case 'homing': {
      const dx = player.x - o.x;
      o.vx += dx * 1.5 * dt;
      o.vx = Math.max(-180, Math.min(180, o.vx));
      o.x += o.vx * dt;
      break;
    }
  }

  const olb = shoreLeftAt(o.y)  + o.r + 2;
  const orb = shoreRightAt(o.y) - o.r - 2;
  o.x = Math.max(olb, Math.min(orb, o.x));

  // boats fire warning shots that always miss
  if (o.type.id === 'boat' && o.y > 30 && o.y < LH * 0.55) {
    o.shootClock -= dt;
    if (o.shootClock <= 0) {
      o.shootClock = 0.9 + Math.random() * 0.6;
      fireBullet(o);
    }
  }
}

function hits(o) {
  const dx = o.x - player.x;
  const dy = o.y - player.y;
  return Math.sqrt(dx * dx + dy * dy) < o.r + Math.min(TW, TH) * 0.36;
}

function update(dt) {
  if (state === 'idle' || state === 'done' || state === 'confronted') return;

  updateParticles(dt);

  if (state === 'dying') {
    dyingTimer += dt;
    if (dyingTimer > 2 && !leaderboardShown) {
      leaderboardShown = true;
      state = 'done';
      showLeaderboard();
    }
    return;
  }

  // state === 'playing'
  const finishPx = FINISH_NM * NM_PX;
  const atFinish = distance >= finishPx;

  if (atFinish) {
    // approach to the finish — engines all stop
    scrollSpeed *= Math.pow(0.4, dt);
    if (scrollSpeed < 2) scrollSpeed = 0;
  } else {
    scrollSpeed = Math.min(scrollSpeed + SCROLL_ACCEL * dt, MAX_SCROLL);
  }
  scrollY  += scrollSpeed * dt;
  distance  = Math.min(distance + scrollSpeed * dt, finishPx);

  // obstacle spawning — only while still under way
  if (!atFinish) {
    spawnInterval = Math.max(0.55, 1.8 - (distance / NM_PX) * 0.012);
    spawnClock += dt;
    if (spawnClock >= spawnInterval) {
      spawnClock = 0;
      spawnObs();
      if (distance > 30 * NM_PX && Math.random() < 0.32) spawnObs();
      if (distance > 70 * NM_PX && Math.random() < 0.22) spawnObs();
    }
  }

  for (const o of obstacles) updateObs(o, dt);
  obstacles = obstacles.filter(o => !o.dead && o.y < LH + 60);

  // update bullets (cosmetic — they never hit)
  for (const b of bullets) {
    b.age += dt;
    b.x   += b.vx * dt;
    b.y   += b.vy * dt;
  }
  bullets = bullets.filter(b => b.age < b.life
                                && b.x > -30 && b.x < LW + 30
                                && b.y > -30 && b.y < LH + 30);

  // post-hit invulnerability + flash decay
  if (invulTimer > 0) invulTimer = Math.max(0, invulTimer - dt);
  if (hitFlash  > 0) hitFlash  = Math.max(0, hitFlash  - dt * 2);

  // player movement
  const goL = keys.left  || touch.left;
  const goR = keys.right || touch.right;
  if (goL) player.x -= PLAYER_SPD * dt;
  if (goR) player.x += PLAYER_SPD * dt;
  const plb = shoreLeftAt(PLAYER_Y)  + TW / 2 + 2;
  const prb = shoreRightAt(PLAYER_Y) - TW / 2 - 2;
  player.x = Math.max(plb, Math.min(prb, player.x));

  // boss spawn
  if (!bossSpawned && distance / NM_PX >= bossTarget) {
    bossSpawned = true;
    boss = { x: LW / 2, y: -110, vy: 70, timer: 0 };
  }

  // boss approach + perfect x-tracking (no escape)
  if (boss) {
    boss.timer += dt;

    // x always tracks player smoothly — no matter where they go
    const dx = player.x - boss.x;
    boss.x += dx * 3.2 * dt;
    const blb = shoreLeftAt(boss.y)  + 32;
    const brb = shoreRightAt(boss.y) - 32;
    boss.x = Math.max(blb, Math.min(brb, boss.x));

    // descend until locked menacingly above the tanker bow
    const lockY = player.y - 200;
    if (boss.y < lockY) {
      boss.vy = Math.min(boss.vy + 22 * dt, 200);
      boss.y += boss.vy * dt;
      if (boss.y >= lockY) {
        boss.y = lockY;
        boss.x = player.x;
        state = 'confronted';
        leaderboardShown = false;
        deathReason = tankerName.toUpperCase() + ' WAS BOARDED BY USS MANIFEST DESTINY (GOLDEN EDITION).';
        showBossDialog();
      }
    }
  }

  // obstacle collisions — apply damage, mines are fatal, others chip away
  if (invulTimer <= 0) {
    for (const o of obstacles) {
      if (o.dead) continue;
      if (!hits(o)) continue;

      const dmg = DMG[o.type.id] ?? 10;
      damage = Math.min(100, damage + dmg);
      o.dead = true;
      hitFlash = 1;

      if (o.type.id === 'mine') {
        boom(o.x, o.y, '#ff7700', 24);
        boom(player.x, player.y, '#ffaa00', 20);
        boom(player.x, player.y, '#cc2200', 14);
      } else {
        boom(o.x,        o.y,        o.type.color, 12);
        boom(player.x,   player.y,   '#ff8800',     8);
      }

      if (damage >= 100) {
        state = 'dying';
        dyingTimer = 0;
        leaderboardShown = false;
        deathReason = (o.type.id === 'mine')
          ? tankerName.toUpperCase() + ' STRUCK A NAVAL MINE AND BROKE APART IN THE STRAIT.'
          : tankerName.toUpperCase() + ' WAS LOST TO ENEMY ACTION IN THE STRAIT.';
      } else {
        invulTimer = HIT_INVUL;
      }
      break;
    }
  }
}

// ── draw ─────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, LW, LH);
  drawWater();
  drawShores();

  for (const o of obstacles) {
    switch (o.type.id) {
      case 'mine':    drawMine(o.x, o.y, o.r, o.age); break;
      case 'boat':    drawSpeedboat(o.x, o.y, o.r, o.age); break;
      case 'drone':   drawDrone(o.x, o.y, o.r, o.age); break;
      case 'missile': drawMissile(o.x, o.y, o.r, o.vy + scrollSpeed, o.vx); break;
    }
    // label fades in briefly
    if (o.age < 1.2) {
      const la = Math.min(o.age * 3, 1) * (1 - Math.max(0, (o.age - 0.8) / 0.4));
      ctx.save();
      ctx.globalAlpha = la;
      ctx.fillStyle = o.type.color;
      ctx.font = '8px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(o.type.label, o.x, o.y - o.r - 5);
      ctx.restore();
    }
  }

  if (boss) drawBoss(boss);
  drawBullets();
  drawParticles();

  // tanker — fades on death, flickers when invulnerable, red flash on hit
  const dead = state === 'dying';
  let tankerAlpha = dead ? 0.25 : 1;
  if (!dead && invulTimer > 0) {
    // flicker every ~80ms
    tankerAlpha = (Math.floor(invulTimer * 12) % 2 === 0) ? 1 : 0.35;
  }
  drawTanker(player.x, player.y, FLAGS[selectedFlag].emoji, tankerAlpha);

  // hit flash overlay
  if (hitFlash > 0) {
    ctx.save();
    ctx.globalAlpha = hitFlash * 0.45;
    ctx.fillStyle = '#cc1100';
    ctx.fillRect(0, 0, LW, LH);
    ctx.restore();
  }

  if (state !== 'idle' && state !== 'done') drawHUD();

  // boss approach warning
  if (boss && state === 'playing') {
    const bt = boss.timer;
    if (Math.sin(bt * 9) > 0) {
      ctx.save();
      ctx.globalAlpha = Math.min(1, bt * 1.6);
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 12px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚠  U.S. NAVY VESSEL APPROACHING  ⚠', LW / 2, 56);
      ctx.restore();
    }
  }
}

// ── boss confrontation dialog ────────────────────────────────────
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function showBossDialog() {
  const msg = document.getElementById('dialog-msg');
  msg.innerHTML =
    `<b>M/V ${escapeHtml(tankerName.toUpperCase())},</b><br><br>` +
    `You are in violation of traversing the Strait of America.<br><br>` +
    `Prepare to be boarded.`;
  document.getElementById('dialog-panel').classList.remove('hidden');
}

function closeBossDialog() {
  document.getElementById('dialog-panel').classList.add('hidden');
  if (state === 'confronted' && !leaderboardShown) {
    leaderboardShown = true;
    state = 'done';
    showLeaderboard();
  }
}

document.getElementById('dialog-ok').addEventListener('click', closeBossDialog);
document.getElementById('dialog-x').addEventListener('click',  closeBossDialog);

// ── leaderboard ──────────────────────────────────────────────────
const LB_KEY = 'hormuz_lb_v1';

function getLB() {
  try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch { return []; }
}

function saveLB(entry) {
  let lb = getLB();
  lb.push(entry);
  // primary: NM desc; tiebreak: damage asc (less damage = higher rank)
  lb.sort((a, b) => {
    if (b.nm !== a.nm) return b.nm - a.nm;
    return (a.damage ?? 100) - (b.damage ?? 100);
  });
  lb = lb.slice(0, 10);
  localStorage.setItem(LB_KEY, JSON.stringify(lb));
  return lb;
}

function showLeaderboard() {
  const nm = Math.floor(distance / NM_PX);
  const dmg = Math.floor(damage);
  const entry = {
    name: tankerName,
    flag: FLAGS[selectedFlag].emoji,
    nm,
    damage: dmg,
    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
  };
  const lb = saveLB(entry);

  document.getElementById('death-msg').textContent = deathReason;

  const tbody = document.getElementById('lb-body');
  tbody.innerHTML = '';
  lb.forEach((e, i) => {
    const tr = document.createElement('tr');
    if (e.name === tankerName && e.nm === nm && (e.damage ?? -1) === dmg) tr.className = 'you';
    const d = e.damage ?? 100;
    tr.innerHTML =
      `<td>${i + 1}</td>` +
      `<td>${e.flag} ${e.name}</td>` +
      `<td>${e.nm}</td>` +
      `<td>${d}%</td>` +
      `<td>${e.date}</td>`;
    tbody.appendChild(tr);
  });

  document.getElementById('lb-panel').classList.remove('hidden');
}

// ── game init ────────────────────────────────────────────────────
function startGame() {
  state        = 'playing';
  scrollSpeed  = BASE_SCROLL;
  scrollY      = 0;
  distance     = 0;
  obstacles    = [];
  particles    = [];
  spawnClock   = 0;
  spawnInterval = 1.8;
  player       = { x: LW / 2, y: PLAYER_Y };
  bullets      = [];
  boss         = null;
  bossSpawned  = false;
  bossTarget   = FINISH_NM;
  dyingTimer   = 0;
  eatenTimer   = 0;
  damage       = 0;
  invulTimer   = 0;
  hitFlash     = 0;
  leaderboardShown = false;
  deathReason  = '';

  document.getElementById('start-panel').classList.add('hidden');
  document.getElementById('lb-panel').classList.add('hidden');
  document.getElementById('dialog-panel').classList.add('hidden');
}

// ── UI ───────────────────────────────────────────────────────────
document.getElementById('flag-row').addEventListener('click', e => {
  const btn = e.target.closest('[data-idx]');
  if (!btn) return;
  selectedFlag = parseInt(btn.dataset.idx);
  document.querySelectorAll('.flag-opt').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
});

document.getElementById('deploy-btn').addEventListener('click', () => {
  const v = document.getElementById('tanker-name').value.trim();
  tankerName = v || 'MV CRUDE JUSTICE';
  startGame();
});

document.getElementById('tanker-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('deploy-btn').click();
});

document.getElementById('replay-btn').addEventListener('click', () => {
  document.getElementById('lb-panel').classList.add('hidden');
  document.getElementById('start-panel').classList.remove('hidden');
  state = 'idle';
});

// ── loop ─────────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
