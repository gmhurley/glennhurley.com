<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hangman &mdash; Glenn Hurley</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scrollbar-gutter: stable; }

    body {
      font-family: 'Caveat', cursive;
      background: #f5f0e8;
      color: #2c1810;
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #d4c4a0;
    }
    .site-header a {
      text-decoration: none;
      color: #6b4c2a;
      font-size: 1.1rem;
    }
    .site-header a:hover { text-decoration: underline; }

    /* ── Game area ── */
    .game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem;
      gap: 2rem;
    }

    .game-title {
      font-size: clamp(2.8rem, 10vw, 4.5rem);
      font-weight: 700;
      color: #2c1810;
      transform: rotate(-1.5deg);
      line-height: 1;
    }

    /* ── Board: gallows + word side by side ── */
    .game-board {
      display: flex;
      align-items: center;
      gap: 3rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── SVG gallows ── */
    .gallows {
      width: 190px;
      height: 230px;
      flex-shrink: 0;
    }
    .part { display: none; }
    .part.shown { display: block; }

    /* ── Word + status ── */
    .word-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      width: 300px;
      flex-shrink: 0;
    }

    .word {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .letter-slot {
      min-width: 1.6rem;
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.4;
      border-bottom: 2.5px solid #2c1810;
      padding: 0 0.1rem;
    }

    .status {
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      min-height: 2rem;
      width: 100%;
      word-break: break-word;
      color: #2c1810;
    }
    .status.win  { color: #2d6a2d; }
    .status.loss { color: #a0282d; }

    .wrong-letters {
      font-size: 1.2rem;
      color: #a0282d;
      text-align: center;
      min-height: 1.8rem;
    }

    /* ── Keyboard ── */
    .keyboard {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      max-width: 380px;
      justify-content: center;
    }

    .key {
      width: 2.4rem;
      height: 2.4rem;
      background: #faf6ee;
      border: 1.5px solid #c4a882;
      border-radius: 3px;
      font-family: inherit;
      font-size: 1.3rem;
      font-weight: 600;
      color: #2c1810;
      cursor: pointer;
      box-shadow: 1px 2px 0 #c4a882;
      transition: background 0.1s, box-shadow 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .key:hover:not(:disabled) {
      background: #ede4d0;
      box-shadow: 1px 1px 0 #c4a882;
      transform: translateY(1px);
    }
    .key:disabled { cursor: default; box-shadow: none; transform: none; }
    .key.correct { background: #d4edda; color: #2d6a2d; border-color: #a8c5a0; }
    .key.wrong   { background: #f8d7da; color: #a0282d; border-color: #d4a0a0; text-decoration: line-through; }

    /* ── New word button ── */
    .new-game-btn {
      font-family: inherit;
      font-size: 1.6rem;
      font-weight: 700;
      padding: 0.4rem 2.5rem;
      background: #2c1810;
      color: #f5f0e8;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.15s;
      box-shadow: 2px 3px 0 #1a0e08;
    }
    .new-game-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="/">&larr; glennhurley.com</a>
  </header>

  <div class="game-area">

    <h1 class="game-title">Hangman</h1>

    <div class="game-board">

      <!-- Sketch gallows SVG -->
      <svg class="gallows" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg"
           stroke="#2c1810" stroke-linecap="round" stroke-linejoin="round" fill="none">

        <!-- Gallows structure (always visible) -->
        <path d="M10,228 C70,224 130,226 190,228" stroke-width="3.5"/>
        <path d="M48,226 C45,160 51,90 50,18"    stroke-width="3.5"/>
        <path d="M50,20 C90,16 120,18 150,20"    stroke-width="3.5"/>
        <path d="M150,20 C149,32 151,40 150,50"  stroke-width="2.5"/>

        <!-- Body parts, revealed one by one -->
        <circle class="part" id="p-head" cx="150" cy="67" r="17" stroke-width="2.5"/>
        <path   class="part" id="p-body"      d="M150,84 C148,106 151,122 150,138" stroke-width="2.5"/>
        <path   class="part" id="p-left-arm"  d="M150,100 C136,112 124,120 114,132" stroke-width="2.5"/>
        <path   class="part" id="p-right-arm" d="M150,100 C164,112 176,120 186,132" stroke-width="2.5"/>
        <path   class="part" id="p-left-leg"   d="M150,138 C138,156 126,166 118,178" stroke-width="2.5"/>
        <path   class="part" id="p-right-leg"  d="M150,138 C162,156 174,166 182,178" stroke-width="2.5"/>
        <path   class="part" id="p-right-eye"  d="M155,60 L161,66 M161,60 L155,66"  stroke-width="2"/>
        <path   class="part" id="p-left-eye"   d="M139,60 L145,66 M145,60 L139,66"  stroke-width="2"/>
        <path   class="part" id="p-mouth"      d="M142,76 Q150,70 158,76"            stroke-width="2"/>
      </svg>

      <div class="word-area">
        <div class="word"         id="word"></div>
        <div class="status"       id="status"></div>
        <div class="wrong-letters" id="wrong-letters"></div>
      </div>

    </div>

    <div class="keyboard" id="keyboard"></div>

    <button class="new-game-btn" id="new-game-btn">New Word</button>

  </div>

  <script>
    const WORDS = [
      // animals
      'elephant','giraffe','penguin','dolphin','butterfly','dinosaur','hamster',
      'lobster','ostrich','walrus','spider','turtle','rabbit','parrot','kitten',
      'hippo','moose','llama','zebra','panda','falcon','raven','wombat','gecko',
      'koala','bison','toucan','jaguar','pelican','flamingo','platypus','narwhal',
      'monkey','donkey','chicken','turkey','peacock','eagle','owl','swan',
      'seagull','whale','shark','salmon','goldfish','crab','snail','beetle',
      'ladybug','firefly','caterpillar','frog','lizard','crocodile','cheetah',
      'gorilla','squirrel','beaver','otter','hedgehog','raccoon','camel',
      'reindeer','kangaroo','seahorse','octopus','porcupine','chipmunk',
      'jellyfish','buffalo',
      // food
      'apple','orange','lemon','mango','banana','cookie','pizza','cupcake',
      'popcorn','pretzel','noodle','yogurt','waffle','muffin','brownie','pancake',
      'strawberry','blueberry','pineapple','watermelon','broccoli','avocado',
      'cherry','grape','peach','pear','coconut','kiwi','raspberry','tomato',
      'carrot','potato','pumpkin','corn','almond','donut','taco','burger',
      'sandwich','spaghetti','chocolate','lollipop','smoothie','lemonade',
      'gummy','caramel','pudding','biscuit','celery','mushroom',
      // nature
      'forest','jungle','island','desert','glacier','rainbow','thunder','flower',
      'garden','ocean','river','canyon','meadow','sunset','volcano','mountain',
      'snowflake','starfish','seashell','cactus','acorn','feather','pebble',
      'cloud','lightning','tornado','beach','cliff','cave','valley','waterfall',
      'pond','lake','coral','crystal','sand','moss','fern','maple','oak',
      'bamboo','daisy','tulip','rose','sunflower','boulder','iceberg','aurora',
      'comet','sunrise','willow','harbor','fossil','marsh','tundra','blizzard',
      // adventure & fun
      'dragon','wizard','pirate','treasure','castle','rocket','spaceship',
      'mermaid','unicorn','monster','goblin','village','kingdom','adventure',
      'dungeon','compass','lantern','balloon','carnival','firework','knight',
      'princess','fairy','elf','giant','phoenix','robot','alien','astronaut',
      'cowboy','ninja','explorer','detective','superhero','trophy','medal',
      'crown','throne','fortress','lighthouse','pyramid','maze','mystery',
      'quest','safari','circus','parade','museum','laboratory','journey',
      'voyage','temple',
      // everyday things
      'bridge','candle','mirror','pencil','basket','barrel','umbrella','window',
      'helmet','violin','xylophone','zipper','jigsaw','riddle','blanket',
      'backpack','crayon','telescope','trampoline','skateboard','playground',
      'bicycle','scooter','kite','frisbee','puzzle','paintbrush','notebook',
      'clock','lamp','pillow','bucket','broom','shovel','camera','microphone',
      'headphones','button','ribbon','envelope','magnet','thermometer','whistle',
      'trumpet','guitar','drum','harmonica','scissors','ruler','calendar',
      'kettle','ladder','mop','flag',
    ];

    const PARTS = ['p-head','p-body','p-left-arm','p-right-arm','p-left-leg','p-right-leg','p-right-eye','p-left-eye','p-mouth'];
    const MAX_WRONG = PARTS.length;

    let word, guessed, wrongCount, gameOver;

    function newGame() {
      word      = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
      guessed   = new Set();
      wrongCount = 0;
      gameOver  = false;
      buildKeyboard();
      render();
    }

    function buildKeyboard() {
      const kb = document.getElementById('keyboard');
      kb.innerHTML = '';
      for (let i = 0; i < 26; i++) {
        const letter = String.fromCharCode(65 + i);
        const btn = document.createElement('button');
        btn.className    = 'key';
        btn.textContent  = letter;
        btn.dataset.letter = letter;
        btn.addEventListener('click', () => guess(letter));
        kb.appendChild(btn);
      }
    }

    function guess(letter) {
      if (gameOver || guessed.has(letter)) return;
      guessed.add(letter);
      if (!word.includes(letter)) wrongCount++;
      render();
    }

    function render() {
      // Word slots
      const wordEl = document.getElementById('word');
      wordEl.innerHTML = word.split('').map(l =>
        `<span class="letter-slot">${guessed.has(l) ? l : '\u00a0'}</span>`
      ).join('');

      // Body parts
      PARTS.forEach((id, i) => {
        document.getElementById(id).classList.toggle('shown', i < wrongCount);
      });

      // Keyboard keys
      document.querySelectorAll('.key').forEach(btn => {
        const l = btn.dataset.letter;
        if (guessed.has(l)) {
          btn.disabled = true;
          btn.classList.toggle('correct', word.includes(l));
          btn.classList.toggle('wrong',   !word.includes(l));
        }
      });

      // Wrong letters list
      const wrong = [...guessed].filter(l => !word.includes(l));
      document.getElementById('wrong-letters').textContent =
        wrong.length ? 'Wrong: ' + wrong.join(', ') : '';

      // Status
      const statusEl = document.getElementById('status');
      statusEl.className = 'status';
      const won  = word.split('').every(l => guessed.has(l));
      const lost = wrongCount >= MAX_WRONG;
      if (won) {
        statusEl.textContent = 'You got it!';
        statusEl.classList.add('win');
        gameOver = true;
        document.querySelectorAll('.key').forEach(b => b.disabled = true);
      } else if (lost) {
        statusEl.textContent = `It was: ${word}`;
        statusEl.classList.add('loss');
        gameOver = true;
        PARTS.forEach(id => document.getElementById(id).classList.add('shown'));
        document.querySelectorAll('.key').forEach(b => b.disabled = true);
      } else {
        statusEl.textContent = `${MAX_WRONG - wrongCount} left`;
      }
    }

    // Physical keyboard support
    document.addEventListener('keydown', e => {
      const l = e.key.toUpperCase();
      if (l.length === 1 && l >= 'A' && l <= 'Z') guess(l);
    });

    document.getElementById('new-game-btn').addEventListener('click', newGame);

    newGame();
  </script>
  <script data-goatcounter="https://shroomslice.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

</body>
</html>
